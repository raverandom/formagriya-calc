<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#12181a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="FormaGriya Rekap" />
  <title>FormaGriya · Rekap Keuangan</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #12181a;
      --bg2:      #191f22;
      --bg3:      #20282c;
      --card:     #1c2428;
      --border:   #28363c;
      --border2:  #344650;
      --cream:    #e8f0ec;
      --cream2:   #9ab0a8;
      --cream3:   #506860;
      --accent:   #4ea88a;
      --accent2:  #358a6e;
      --gold:     #d4a84a;
      --gold-bg:  rgba(212,168,74,0.1);
      --gold-bdr: rgba(212,168,74,0.25);
      --red:      #c05a5a;
      --red-bg:   rgba(192,90,90,0.1);
      --red-bdr:  rgba(192,90,90,0.25);
      --green-bg: rgba(78,168,138,0.1);
      --green-bdr:rgba(78,168,138,0.25);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--cream);
      padding-bottom: 48px;
    }

    /* ── Top Bar ── */
    .top-bar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 14px 18px;
      position: sticky; top: 0; z-index: 100;
    }
    .top-inner { max-width: 520px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    .brand-tag { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); font-weight: 700; }
    .brand-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 700; color: var(--cream); }
    .add-btn {
      background: var(--accent); color: white; border: none;
      border-radius: 10px; padding: 9px 16px; font-size: 13px;
      font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: background 0.2s;
    }
    .add-btn:active { background: var(--accent2); }

    /* ── Period Selector ── */
    .period-wrap { max-width: 520px; margin: 14px auto 0; padding: 0 18px; }
    .period-row { display: flex; gap: 8px; align-items: center; }
    .period-select {
      flex: 1; background: var(--bg3); border: 1.5px solid var(--border2);
      border-radius: 10px; padding: 10px 13px; font-size: 14px;
      color: var(--cream); font-family: 'DM Sans', sans-serif;
      outline: none; -webkit-appearance: none; cursor: pointer;
    }
    .period-select option { background: var(--bg2); }
    .period-select:focus { border-color: var(--accent); }
    .all-btn {
      background: var(--bg3); border: 1.5px solid var(--border2);
      color: var(--cream2); border-radius: 10px; padding: 10px 14px;
      font-size: 12px; font-weight: 700; cursor: pointer;
      font-family: 'DM Sans', sans-serif; white-space: nowrap;
      transition: all 0.15s;
    }
    .all-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

    /* ── Main ── */
    .main { max-width: 520px; margin: 14px auto 0; padding: 0 18px; }

    /* Summary cards */
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .sum-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px 14px;
    }
    .sum-card.full { grid-column: 1 / -1; }
    .sum-icon { font-size: 20px; margin-bottom: 6px; }
    .sum-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--cream3); font-weight: 700; margin-bottom: 4px; }
    .sum-val { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 700; line-height: 1; }
    .sum-sub { font-size: 11px; color: var(--cream3); margin-top: 3px; }
    .c-omzet  { color: var(--cream); }
    .c-modal  { color: var(--gold); }
    .c-profit { color: var(--accent); }
    .c-red    { color: var(--red); }

    /* Profit bar */
    .profit-bar-wrap { margin-top: 10px; margin-bottom: 4px; }
    .profit-bar-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--cream3); margin-bottom: 5px; }
    .profit-bar-track { height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
    .profit-bar-fill  { height: 100%; border-radius: 4px; background: var(--accent); transition: width 0.6s ease; }

    /* Chart */
    .chart-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px 14px; margin-bottom: 10px;
    }
    .chart-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); font-weight: 700; margin-bottom: 14px; }
    .bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 80px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
    .bar-fill { width: 100%; border-radius: 4px 4px 0 0; background: var(--accent); opacity: 0.85; transition: height 0.5s ease; min-height: 4px; }
    .bar-fill.modal { background: var(--gold); opacity: 0.5; }
    .bar-label { font-size: 9px; color: var(--cream3); text-align: center; white-space: nowrap; }

    /* Transactions */
    .section-hdr {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px;
    }
    .section-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 700; color: var(--cream); }
    .filter-tabs { display: flex; gap: 6px; }
    .tab-btn {
      background: var(--bg3); border: 1px solid var(--border2);
      color: var(--cream2); border-radius: 7px; padding: 4px 10px;
      font-size: 11px; font-weight: 600; cursor: pointer;
      font-family: 'DM Sans', sans-serif; transition: all 0.15s;
    }
    .tab-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

    .tx-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 13px 14px; margin-bottom: 8px;
      animation: fadeUp 0.25s ease both;
    }
    .tx-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
    .tx-name { font-size: 14px; font-weight: 600; color: var(--cream); }
    .tx-amount { font-family: monospace; font-size: 14px; font-weight: 700; }
    .tx-amount.income  { color: var(--accent); }
    .tx-amount.expense { color: var(--red); }
    .tx-meta { font-size: 11px; color: var(--cream3); }
    .tx-category {
      display: inline-block; font-size: 10px; padding: 2px 8px;
      border-radius: 5px; font-weight: 600; margin-top: 5px;
    }
    .cat-omzet   { background: var(--green-bg); color: var(--accent); }
    .cat-modal   { background: var(--gold-bg);  color: var(--gold); }
    .cat-operasional { background: var(--red-bg); color: var(--red); }
    .cat-lain    { background: rgba(255,255,255,0.05); color: var(--cream2); }

    .tx-actions { display: flex; justify-content: flex-end; gap: 6px; margin-top: 8px; padding-top: 6px; border-top: 1px solid var(--border); }
    .tx-act {
      background: none; border: 1px solid var(--border2); color: var(--cream3);
      border-radius: 6px; padding: 3px 10px; font-size: 11px; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }
    .tx-act.del { color: var(--red); border-color: var(--red-bdr); }

    .empty-state {
      text-align: center; padding: 36px 20px;
      color: var(--cream3); font-size: 13px;
      border: 1px dashed var(--border2); border-radius: 12px;
    }

    /* ── Modal ── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      z-index: 200; display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: 20px 20px 0 0; padding: 22px 18px 40px;
      width: 100%; max-width: 520px;
      transform: translateY(30px); transition: transform 0.25s ease;
      max-height: 85vh; overflow-y: auto;
    }
    .overlay.open .modal { transform: translateY(0); }

    .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 700; color: var(--cream); margin-bottom: 18px; }

    /* Type toggle */
    .type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    .type-btn {
      border-radius: 10px; padding: 11px; text-align: center;
      cursor: pointer; border: 1.5px solid var(--border2);
      background: var(--bg3); color: var(--cream2);
      font-weight: 700; font-size: 14px; font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }
    .type-btn.active-income  { background: var(--green-bg); border-color: var(--accent); color: var(--accent); }
    .type-btn.active-expense { background: var(--red-bg);   border-color: var(--red);    color: var(--red); }

    .form-group { margin-bottom: 13px; }
    .form-label { font-size: 11px; font-weight: 700; color: var(--cream2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; display: block; }
    .form-input, .form-select {
      width: 100%; background: var(--bg3); border: 1.5px solid var(--border2);
      border-radius: 10px; padding: 11px 13px; font-size: 14px; color: var(--cream);
      font-family: 'DM Sans', sans-serif; outline: none; -webkit-appearance: none;
      transition: border-color 0.2s;
    }
    .form-input:focus, .form-select:focus { border-color: var(--accent); }
    .form-select option { background: var(--bg2); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .modal-btns { display: flex; gap: 10px; margin-top: 16px; }
    .btn-save {
      flex: 1; background: var(--accent); color: white; border: none;
      border-radius: 11px; padding: 13px; font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
    }
    .btn-cancel {
      background: var(--bg3); color: var(--cream2); border: 1px solid var(--border2);
      border-radius: 11px; padding: 13px 18px; font-size: 15px; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }

    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: var(--accent); color: white;
      padding: 10px 22px; border-radius: 20px;
      font-size: 13px; font-weight: 700;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
      z-index: 999; white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">
  <div class="top-inner">
    <div>
      <div class="brand-tag">FormaGriya</div>
      <div class="brand-title">Rekap Keuangan</div>
    </div>
    <button class="add-btn" onclick="openModal()">＋ Catat</button>
  </div>
</div>

<!-- Period -->
<div class="period-wrap">
  <div class="period-row">
    <select class="period-select" id="period-select" onchange="render()"></select>
    <button class="all-btn" id="all-btn" onclick="toggleAll()">Semua</button>
  </div>
</div>

<!-- Main -->
<div class="main">

  <!-- Summary -->
  <div class="summary-grid">
    <div class="sum-card">
      <div class="sum-icon">📈</div>
      <div class="sum-label">Omzet</div>
      <div class="sum-val c-omzet" id="s-omzet">Rp 0</div>
      <div class="sum-sub" id="s-omzet-n">0 transaksi</div>
    </div>
    <div class="sum-card">
      <div class="sum-icon">📦</div>
      <div class="sum-label">Total Modal</div>
      <div class="sum-val c-modal" id="s-modal">Rp 0</div>
      <div class="sum-sub" id="s-modal-n">HPP + ongkos</div>
    </div>
    <div class="sum-card">
      <div class="sum-icon">💸</div>
      <div class="sum-label">Pengeluaran</div>
      <div class="sum-val c-red" id="s-pengeluaran">Rp 0</div>
      <div class="sum-sub">operasional & lain</div>
    </div>
    <div class="sum-card">
      <div class="sum-icon">✦</div>
      <div class="sum-label">Profit Bersih</div>
      <div class="sum-val c-profit" id="s-profit">Rp 0</div>
      <div class="sum-sub" id="s-margin">Margin 0%</div>
    </div>
    <div class="sum-card full">
      <div class="sum-label">Margin Profit</div>
      <div class="profit-bar-wrap">
        <div class="profit-bar-label">
          <span id="bar-label-l">0%</span>
          <span style="color:var(--accent)" id="bar-label-r">dari omzet</span>
        </div>
        <div class="profit-bar-track">
          <div class="profit-bar-fill" id="profit-bar" style="width:0%"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bar Chart -->
  <div class="chart-card">
    <div class="chart-title">📊 Omzet vs Modal — 6 Bulan Terakhir</div>
    <div class="bar-chart" id="bar-chart"></div>
  </div>

  <!-- Transactions -->
  <div class="section-hdr">
    <div class="section-title">Riwayat</div>
    <div class="filter-tabs">
      <button class="tab-btn active" onclick="setTab('semua',this)">Semua</button>
      <button class="tab-btn" onclick="setTab('income',this)">Masuk</button>
      <button class="tab-btn" onclick="setTab('expense',this)">Keluar</button>
    </div>
  </div>
  <div id="tx-list"></div>
</div>

<!-- Modal -->
<div class="overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="modal-title">Catat Transaksi</div>

    <div class="type-toggle">
      <button class="type-btn active-income" id="btn-income" onclick="setType('income')">💰 Pemasukan</button>
      <button class="type-btn" id="btn-expense" onclick="setType('expense')">💸 Pengeluaran</button>
    </div>

    <div class="form-group">
      <label class="form-label">Keterangan</label>
      <input class="form-input" id="f-nama" type="text" placeholder="contoh: Penjualan Rak Dinding" />
    </div>
    <div class="form-group">
      <label class="form-label">Jumlah (Rp)</label>
      <input class="form-input" id="f-jumlah" type="number" placeholder="0" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Kategori</label>
        <select class="form-select" id="f-kategori"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Tanggal</label>
        <input class="form-input" id="f-tgl" type="date" />
      </div>
    </div>

    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Batal</button>
      <button class="btn-save" onclick="saveTx()">Simpan</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let txs = JSON.parse(localStorage.getItem('fg_rekap') || '[]');
  let editId = null;
  let txType = 'income';
  let txTab  = 'semua';
  let showAll = false;

  const CATS = {
    income:  ['Penjualan Furnitur', 'DP Masuk', 'Pelunasan', 'Lain-lain'],
    expense: ['Modal / HPP', 'Ongkir', 'Packing', 'Operasional', 'Peralatan', 'Lain-lain'],
  };
  const CAT_CLASS = {
    'Penjualan Furnitur': 'cat-omzet', 'DP Masuk': 'cat-omzet', 'Pelunasan': 'cat-omzet',
    'Modal / HPP': 'cat-modal', 'Ongkir': 'cat-modal', 'Packing': 'cat-modal',
    'Operasional': 'cat-operasional', 'Peralatan': 'cat-operasional',
  };

  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
  function save() { localStorage.setItem('fg_rekap', JSON.stringify(txs)); }
  function rp(v)  { return 'Rp ' + Math.round(v||0).toLocaleString('id-ID'); }

  function getMonths() {
    const months = new Set();
    txs.forEach(t => { if (t.tgl) months.add(t.tgl.slice(0,7)); });
    return [...months].sort().reverse();
  }

  function buildPeriodOptions() {
    const sel = document.getElementById('period-select');
    const months = getMonths();
    const now = new Date().toISOString().slice(0,7);
    if (!months.includes(now)) months.unshift(now);
    sel.innerHTML = months.map(m => {
      const [y,mo] = m.split('-');
      const label = new Date(y, mo-1).toLocaleDateString('id-ID', { month:'long', year:'numeric' });
      return `<option value="${m}">${label}</option>`;
    }).join('');
  }

  function currentPeriod() {
    if (showAll) return null;
    return document.getElementById('period-select').value;
  }

  function filteredTxs() {
    const p = currentPeriod();
    let list = p ? txs.filter(t => t.tgl && t.tgl.startsWith(p)) : txs;
    if (txTab === 'income')  list = list.filter(t => t.type === 'income');
    if (txTab === 'expense') list = list.filter(t => t.type === 'expense');
    return list.sort((a,b) => (b.tgl||'') > (a.tgl||'') ? 1 : -1);
  }

  function toggleAll() {
    showAll = !showAll;
    document.getElementById('all-btn').classList.toggle('active', showAll);
    document.getElementById('period-select').disabled = showAll;
    render();
  }

  // ── Render ───────────────────────────────────────────
  function render() {
    buildPeriodOptions();
    const p = currentPeriod();
    const allForPeriod = p ? txs.filter(t => t.tgl && t.tgl.startsWith(p)) : txs;

    const omzet = allForPeriod.filter(t=>t.type==='income').reduce((s,t)=>s+(Number(t.jumlah)||0),0);
    const modalTotal = allForPeriod.filter(t=>t.type==='expense'&&['Modal / HPP','Ongkir','Packing'].includes(t.kategori)).reduce((s,t)=>s+(Number(t.jumlah)||0),0);
    const pengeluaran = allForPeriod.filter(t=>t.type==='expense').reduce((s,t)=>s+(Number(t.jumlah)||0),0);
    const profit = omzet - pengeluaran;
    const margin = omzet > 0 ? Math.round((profit/omzet)*100) : 0;
    const nIncome = allForPeriod.filter(t=>t.type==='income').length;

    document.getElementById('s-omzet').textContent       = rp(omzet);
    document.getElementById('s-omzet-n').textContent     = nIncome + ' transaksi';
    document.getElementById('s-modal').textContent       = rp(modalTotal);
    document.getElementById('s-pengeluaran').textContent = rp(pengeluaran);
    document.getElementById('s-profit').textContent      = rp(profit);
    document.getElementById('s-margin').textContent      = 'Margin ' + margin + '%';
    document.getElementById('s-profit').style.color      = profit >= 0 ? 'var(--accent)' : 'var(--red)';

    const barPct = omzet > 0 ? Math.max(0, Math.min(100, margin)) : 0;
    document.getElementById('profit-bar').style.width    = barPct + '%';
    document.getElementById('profit-bar').style.background = profit >= 0 ? 'var(--accent)' : 'var(--red)';
    document.getElementById('bar-label-l').textContent   = margin + '%';

    renderChart();
    renderTxList();
  }

  function renderChart() {
    const now = new Date();
    const months = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const key = d.toISOString().slice(0,7);
      const label = d.toLocaleDateString('id-ID', { month:'short' });
      const omzet = txs.filter(t=>t.tgl&&t.tgl.startsWith(key)&&t.type==='income').reduce((s,t)=>s+(Number(t.jumlah)||0),0);
      const modal = txs.filter(t=>t.tgl&&t.tgl.startsWith(key)&&t.type==='expense').reduce((s,t)=>s+(Number(t.jumlah)||0),0);
      months.push({ label, omzet, modal });
    }

    const maxVal = Math.max(...months.map(m => Math.max(m.omzet, m.modal)), 1);

    document.getElementById('bar-chart').innerHTML = months.map(m => {
      const hOmzet = Math.round((m.omzet / maxVal) * 70);
      const hModal = Math.round((m.modal / maxVal) * 70);
      return `
        <div class="bar-col">
          <div style="display:flex;gap:2px;align-items:flex-end;height:70px">
            <div class="bar-fill" style="height:${hOmzet}px;flex:1"></div>
            <div class="bar-fill modal" style="height:${hModal}px;flex:1"></div>
          </div>
          <div class="bar-label">${m.label}</div>
        </div>
      `;
    }).join('');
  }

  function renderTxList() {
    const list = filteredTxs();
    const el = document.getElementById('tx-list');
    if (list.length === 0) {
      el.innerHTML = `<div class="empty-state">Belum ada transaksi.<br>Tap <b>＋ Catat</b> untuk mulai.</div>`;
      return;
    }
    el.innerHTML = list.map((t, i) => {
      const catClass = CAT_CLASS[t.kategori] || 'cat-lain';
      const fmtDate = t.tgl ? new Date(t.tgl).toLocaleDateString('id-ID', {day:'numeric',month:'short',year:'numeric'}) : '';
      return `
        <div class="tx-card" style="animation-delay:${i*0.03}s">
          <div class="tx-top">
            <div class="tx-name">${t.nama}</div>
            <div class="tx-amount ${t.type}">${t.type==='income' ? '+' : '-'}${rp(t.jumlah)}</div>
          </div>
          <div class="tx-meta">${fmtDate}</div>
          <span class="tx-category ${catClass}">${t.kategori}</span>
          <div class="tx-actions">
            <button class="tx-act" onclick="openEdit('${t.id}')">✏ Edit</button>
            <button class="tx-act del" onclick="hapus('${t.id}')">🗑 Hapus</button>
          </div>
        </div>
      `;
    }).join('');
  }

  // ── Actions ──────────────────────────────────────────
  function setTab(tab, btn) {
    txTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTxList();
  }

  function hapus(id) {
    if (!confirm('Hapus transaksi ini?')) return;
    txs = txs.filter(t=>t.id!==id);
    save(); render();
  }

  // ── Modal ────────────────────────────────────────────
  function setType(type) {
    txType = type;
    document.getElementById('btn-income').className  = 'type-btn' + (type==='income'  ? ' active-income'  : '');
    document.getElementById('btn-expense').className = 'type-btn' + (type==='expense' ? ' active-expense' : '');
    buildCatSelect();
  }

  function buildCatSelect() {
    document.getElementById('f-kategori').innerHTML = CATS[txType].map(c => `<option>${c}</option>`).join('');
  }

  function openModal() {
    editId = null;
    document.getElementById('modal-title').textContent = 'Catat Transaksi';
    setType('income');
    document.getElementById('f-nama').value   = '';
    document.getElementById('f-jumlah').value = '';
    document.getElementById('f-tgl').value    = new Date().toISOString().split('T')[0];
    document.getElementById('modal-overlay').classList.add('open');
  }

  function openEdit(id) {
    const t = txs.find(t=>t.id===id);
    if (!t) return;
    editId = id;
    document.getElementById('modal-title').textContent = 'Edit Transaksi';
    setType(t.type);
    document.getElementById('f-nama').value   = t.nama;
    document.getElementById('f-jumlah').value = t.jumlah;
    document.getElementById('f-tgl').value    = t.tgl || '';
    // set kategori
    const sel = document.getElementById('f-kategori');
    [...sel.options].forEach(o => { if (o.value === t.kategori) o.selected = true; });
    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    editId = null;
  }

  function saveTx() {
    const nama    = document.getElementById('f-nama').value.trim();
    const jumlah  = Number(document.getElementById('f-jumlah').value);
    const kategori= document.getElementById('f-kategori').value;
    const tgl     = document.getElementById('f-tgl').value;
    if (!nama)   { showToast('Keterangan wajib diisi'); return; }
    if (!jumlah) { showToast('Jumlah wajib diisi'); return; }

    if (editId) {
      const t = txs.find(t=>t.id===editId);
      if (t) Object.assign(t, { nama, jumlah, kategori, tgl, type: txType });
    } else {
      txs.unshift({ id: uid(), nama, jumlah, kategori, tgl, type: txType });
    }
    save(); closeModal(); render();
    showToast(editId ? 'Transaksi diperbarui' : 'Transaksi disimpan ✓');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  document.getElementById('modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // ── Init ─────────────────────────────────────────────
  render();
</script>
</body>
</html>
