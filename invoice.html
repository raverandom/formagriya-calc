<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#fdf6ee" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="RootStudio Invoice" />
  <title>RootStudio · Invoice</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #fdf6ee;
      --bg2:     #f5e8d8;
      --bg3:     #ede0cc;
      --card:    #ffffff;
      --border:  #e8d5c4;
      --border2: #d4b99a;
      --brown:   #3d2b1f;
      --brown2:  #7a5c40;
      --brown3:  #a08070;
      --brown4:  #c4a882;
      --accent:  #c17f4e;
      --accent2: #9e6030;
      --green:   #5a8a6a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--brown);
      padding-bottom: 48px;
    }

    /* ── Top Bar ── */
    .top-bar {
      background: var(--brown);
      padding: 14px 18px;
      position: sticky; top: 0; z-index: 100;
    }
    .top-inner {
      max-width: 520px; margin: 0 auto;
      display: flex; justify-content: space-between; align-items: center;
    }
    .brand-tag { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--brown4); font-weight: 700; }
    .brand-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: #f5e8d8; }
    .top-btns { display: flex; gap: 8px; }
    .top-btn {
      border: none; border-radius: 9px; padding: 8px 14px;
      font-size: 12px; font-weight: 700; cursor: pointer;
      font-family: 'DM Sans', sans-serif; transition: all 0.2s;
    }
    .btn-new   { background: var(--accent); color: white; }
    .btn-new:active { background: var(--accent2); }
    .btn-list  { background: rgba(255,255,255,0.1); color: #f5e8d8; border: 1px solid rgba(255,255,255,0.2); }

    /* ── Views ── */
    .view { max-width: 520px; margin: 0 auto; padding: 18px 18px 0; display: none; }
    .view.active { display: block; }

    /* ── Form View ── */
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 16px; font-weight: 700; color: var(--brown);
      margin-bottom: 12px; margin-top: 18px;
      padding-bottom: 6px; border-bottom: 1.5px solid var(--border);
    }
    .section-title:first-child { margin-top: 0; }

    .form-group { margin-bottom: 13px; }
    .form-label {
      font-size: 11px; font-weight: 700; color: var(--brown2);
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 6px; display: block;
    }
    .form-input, .form-select {
      width: 100%; background: white;
      border: 1.5px solid var(--border); border-radius: 10px;
      padding: 11px 13px; font-size: 14px; color: var(--brown);
      font-family: 'DM Sans', sans-serif; outline: none;
      transition: border-color 0.2s; -webkit-appearance: none;
    }
    .form-input:focus, .form-select:focus { border-color: var(--accent); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* Items */
    .items-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
    .item-row {
      background: white; border: 1.5px solid var(--border);
      border-radius: 11px; padding: 12px;
      display: grid; grid-template-columns: 1fr auto auto;
      gap: 8px; align-items: center;
    }
    .item-name { font-size: 14px; color: var(--brown); font-weight: 500; }
    .item-price { font-size: 13px; color: var(--accent); font-family: monospace; font-weight: 700; white-space: nowrap; }
    .item-del {
      background: none; border: none; color: #c05a4a;
      font-size: 16px; cursor: pointer; padding: 2px 4px;
    }
    .add-item-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; align-items: flex-end; }
    .add-item-btn {
      background: var(--accent); color: white; border: none;
      border-radius: 9px; padding: 11px 14px; font-size: 13px;
      font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif;
      white-space: nowrap;
    }

    /* Summary */
    .summary-box {
      background: white; border: 1.5px solid var(--border);
      border-radius: 12px; padding: 14px; margin-top: 10px;
    }
    .sum-row {
      display: flex; justify-content: space-between;
      font-size: 13px; padding: 5px 0;
      border-bottom: 1px solid var(--bg2);
      color: var(--brown2);
    }
    .sum-row:last-child { border-bottom: none; }
    .sum-row.total {
      font-size: 16px; font-weight: 700; color: var(--brown);
      padding-top: 10px; margin-top: 4px;
    }
    .sum-val { font-family: monospace; font-weight: 600; }
    .sum-row.total .sum-val { color: var(--accent); }

    .generate-btn {
      width: 100%; background: var(--brown); color: #f5e8d8;
      border: none; border-radius: 13px; padding: 15px;
      font-size: 16px; font-weight: 700; cursor: pointer;
      font-family: 'Playfair Display', serif;
      margin-top: 18px; transition: background 0.2s;
      letter-spacing: 0.5px;
    }
    .generate-btn:active { background: var(--brown2); }

    /* ── Invoice Preview ── */
    .preview-wrap {
      background: white; border: 1.5px solid var(--border);
      border-radius: 16px; overflow: hidden; margin-bottom: 14px;
    }

    .inv-header {
      background: var(--brown); padding: 24px 22px 20px;
      position: relative; overflow: hidden;
    }
    .inv-header::before {
      content: '';
      position: absolute; top: -30px; right: -30px;
      width: 120px; height: 120px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
    }
    .inv-header::after {
      content: '';
      position: absolute; bottom: -20px; right: 40px;
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(255,255,255,0.03);
    }
    .inv-brand {
      font-family: 'Playfair Display', serif;
      font-size: 22px; font-weight: 700; color: #f5e8d8;
      margin-bottom: 2px;
    }
    .inv-tagline { font-size: 11px; color: var(--brown4); letter-spacing: 2px; text-transform: uppercase; }
    .inv-no-row {
      display: flex; justify-content: space-between; align-items: flex-end;
      margin-top: 16px;
    }
    .inv-no { font-size: 12px; color: var(--brown4); }
    .inv-no span { color: #f5e8d8; font-weight: 700; font-size: 13px; }
    .inv-date { font-size: 12px; color: var(--brown4); text-align: right; }
    .inv-date span { color: #f5e8d8; font-weight: 600; display: block; }

    .inv-body { padding: 20px 22px; }

    .inv-to-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--brown3); margin-bottom: 4px; }
    .inv-to-name  { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--brown); }
    .inv-to-note  { font-size: 12px; color: var(--brown3); margin-top: 2px; }

    .inv-divider  { height: 1px; background: var(--border); margin: 16px 0; }

    .inv-items-header {
      display: grid; grid-template-columns: 1fr auto;
      font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--brown3); font-weight: 700; margin-bottom: 8px;
    }
    .inv-item-row {
      display: grid; grid-template-columns: 1fr auto;
      padding: 9px 0; border-bottom: 1px solid var(--bg2);
      align-items: center;
    }
    .inv-item-row:last-child { border-bottom: none; }
    .inv-item-name { font-size: 14px; color: var(--brown); font-weight: 500; }
    .inv-item-price { font-size: 14px; font-family: monospace; font-weight: 700; color: var(--brown); }

    .inv-total-box {
      background: var(--bg); border-radius: 10px;
      padding: 14px; margin-top: 14px;
    }
    .inv-total-row {
      display: flex; justify-content: space-between;
      font-size: 13px; color: var(--brown2); padding: 4px 0;
    }
    .inv-total-row.grand {
      font-size: 17px; font-weight: 700; color: var(--brown);
      padding-top: 10px; margin-top: 6px;
      border-top: 1.5px solid var(--border);
    }
    .inv-total-row.grand .inv-total-val { color: var(--accent); }
    .inv-total-val { font-family: monospace; font-weight: 600; }

    .inv-payment {
      margin-top: 14px; background: #f0f7f2;
      border: 1px solid #c8e0d0; border-radius: 10px; padding: 14px;
    }
    .inv-payment-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--green); font-weight: 700; margin-bottom: 8px; }
    .inv-payment-row { font-size: 13px; color: var(--brown); margin-bottom: 4px; }
    .inv-payment-row span { font-weight: 700; }

    .inv-status-row {
      display: flex; justify-content: space-between; align-items: center; margin-top: 14px;
    }
    .inv-status-badge {
      border-radius: 20px; padding: 5px 14px; font-size: 12px; font-weight: 700;
    }
    .badge-lunas  { background: #e8f5ee; color: var(--green); border: 1px solid #c8e0d0; }
    .badge-dp     { background: #fef6e8; color: var(--accent); border: 1px solid #f0d8b0; }
    .badge-belum  { background: #fef0ee; color: #c05a4a; border: 1px solid #f0c8c0; }
    .inv-created  { font-size: 11px; color: var(--brown3); }

    .inv-footer {
      background: var(--bg2); padding: 14px 22px;
      text-align: center; border-top: 1px solid var(--border);
    }
    .inv-footer-text { font-size: 12px; color: var(--brown3); font-style: italic; }
    .inv-footer-brand { font-family: 'Playfair Display', serif; font-size: 13px; color: var(--brown2); font-weight: 600; margin-top: 4px; }

    /* Action buttons */
    .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .action-btn {
      border: none; border-radius: 11px; padding: 13px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      font-family: 'DM Sans', sans-serif; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-share  { background: var(--accent); color: white; }
    .btn-share:active  { background: var(--accent2); }
    .btn-copy   { background: var(--bg3); color: var(--brown); border: 1.5px solid var(--border2); }
    .btn-edit   { background: white; color: var(--brown); border: 1.5px solid var(--border); }
    .btn-delete { background: white; color: #c05a4a; border: 1.5px solid rgba(192,90,74,0.3); }

    /* ── History View ── */
    .hist-card {
      background: white; border: 1.5px solid var(--border);
      border-radius: 13px; padding: 14px; margin-bottom: 10px;
      cursor: pointer; transition: border-color 0.15s;
      animation: fadeUp 0.25s ease both;
    }
    .hist-card:active { border-color: var(--accent); }
    .hist-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
    .hist-buyer { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; }
    .hist-no { font-size: 11px; color: var(--brown3); font-family: monospace; }
    .hist-meta { font-size: 12px; color: var(--brown3); }
    .hist-total { font-size: 14px; font-family: monospace; font-weight: 700; color: var(--accent); margin-top: 4px; }

    .empty-hist {
      text-align: center; padding: 50px 20px;
      color: var(--brown3); font-size: 14px;
    }
    .empty-hist-icon { font-size: 40px; margin-bottom: 12px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: var(--brown); color: #f5e8d8;
      padding: 10px 22px; border-radius: 20px;
      font-size: 13px; font-weight: 600;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
      z-index: 999; white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">
  <div class="top-inner">
    <div>
      <div class="brand-tag">Root Studio</div>
      <div class="brand-title">Invoice</div>
    </div>
    <div class="top-btns">
      <button class="top-btn btn-list" onclick="showView('history')">📋 Riwayat</button>
      <button class="top-btn btn-new"  onclick="showView('form'); resetForm()">＋ Buat</button>
    </div>
  </div>
</div>

<!-- Form View -->
<div class="view active" id="view-form">

  <div class="section-title">Info Buyer</div>
  <div class="form-group">
    <label class="form-label">Nama Buyer</label>
    <input class="form-input" id="f-buyer" type="text" placeholder="contoh: Pak Reza" />
  </div>
  <div class="form-group">
    <label class="form-label">Alamat / Kota</label>
    <input class="form-input" id="f-alamat" type="text" placeholder="contoh: Jl. Mawar No.5, Makassar" />
  </div>

  <div class="section-title">Produk</div>
  <div class="items-list" id="items-list"></div>
  <div class="add-item-row">
    <div class="form-group" style="margin:0">
      <input class="form-input" id="f-item-name" type="text" placeholder="Nama barang" />
    </div>
    <div class="form-group" style="margin:0">
      <input class="form-input" id="f-item-price" type="number" placeholder="Harga (Rp)" />
    </div>
    <button class="add-item-btn" onclick="addItem()">＋</button>
  </div>

  <div class="section-title">Biaya Tambahan</div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">Ongkir (Rp)</label>
      <input class="form-input" id="f-ongkir" type="number" placeholder="0" oninput="updateSummary()" />
    </div>
    <div class="form-group">
      <label class="form-label">Diskon (Rp)</label>
      <input class="form-input" id="f-diskon" type="number" placeholder="0" oninput="updateSummary()" />
    </div>
  </div>

  <div class="section-title">Pembayaran</div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">Status Bayar</label>
      <select class="form-select" id="f-bayar">
        <option value="belum">Belum Bayar</option>
        <option value="dp">DP / Uang Muka</option>
        <option value="lunas">Lunas</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Tanggal</label>
      <input class="form-input" id="f-tgl" type="date" />
    </div>
  </div>

  <div class="section-title">Info Rekening</div>
  <div class="form-group">
    <label class="form-label">Bank</label>
    <input class="form-input" id="f-bank" type="text" placeholder="contoh: BCA / BRI / Mandiri" />
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">No. Rekening</label>
      <input class="form-input" id="f-rek" type="text" placeholder="0123456789" />
    </div>
    <div class="form-group">
      <label class="form-label">Atas Nama</label>
      <input class="form-input" id="f-atas" type="text" placeholder="Nama pemilik rek" />
    </div>
  </div>

  <div class="section-title">Ringkasan</div>
  <div class="summary-box">
    <div class="sum-row"><span>Subtotal</span><span class="sum-val" id="sum-sub">Rp 0</span></div>
    <div class="sum-row"><span>Ongkir</span><span class="sum-val" id="sum-ongkir">Rp 0</span></div>
    <div class="sum-row"><span>Diskon</span><span class="sum-val" id="sum-diskon">- Rp 0</span></div>
    <div class="sum-row total"><span>Total</span><span class="sum-val" id="sum-total">Rp 0</span></div>
  </div>

  <button class="generate-btn" onclick="generateInvoice()">✦ Buat Invoice</button>
</div>

<!-- Preview View -->
<div class="view" id="view-preview">
  <div class="action-row">
    <button class="action-btn btn-share" onclick="shareInvoice()">📤 Share</button>
    <button class="action-btn btn-copy"  onclick="copyText()">📋 Copy Teks</button>
  </div>
  <div class="action-row">
    <button class="action-btn btn-edit"   onclick="showView('form')">✏ Edit</button>
    <button class="action-btn btn-delete" onclick="deleteInvoice()">🗑 Hapus</button>
  </div>
  <div class="preview-wrap" id="invoice-preview"></div>
</div>

<!-- History View -->
<div class="view" id="view-history">
  <div id="history-list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  let invoices = JSON.parse(localStorage.getItem('rs_invoices') || '[]');
  let items = [];
  let currentInvId = null;
  let editingId = null;

  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
  function save() { localStorage.setItem('rs_invoices', JSON.stringify(invoices)); }
  function rp(v) { return 'Rp ' + Math.round(v||0).toLocaleString('id-ID'); }
  function fmtDate(d) {
    if (!d) return '-';
    return new Date(d).toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' });
  }
  function invNo() {
    const n = (invoices.length + 1).toString().padStart(3,'0');
    const d = new Date();
    return `RS-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}-${n}`;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // ── Views ────────────────────────────────────────────
  function showView(v) {
    document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
    document.getElementById('view-' + v).classList.add('active');
    if (v === 'history') renderHistory();
  }

  // ── Items ────────────────────────────────────────────
  function renderItems() {
    const list = document.getElementById('items-list');
    if (items.length === 0) { list.innerHTML = ''; updateSummary(); return; }
    list.innerHTML = items.map((it, i) => `
      <div class="item-row">
        <div class="item-name">${it.name}</div>
        <div class="item-price">${rp(it.price)}</div>
        <button class="item-del" onclick="removeItem(${i})">✕</button>
      </div>
    `).join('');
    updateSummary();
  }

  function addItem() {
    const name  = document.getElementById('f-item-name').value.trim();
    const price = Number(document.getElementById('f-item-price').value);
    if (!name || !price) { showToast('Isi nama & harga barang'); return; }
    items.push({ name, price });
    document.getElementById('f-item-name').value = '';
    document.getElementById('f-item-price').value = '';
    renderItems();
    document.getElementById('f-item-name').focus();
  }

  function removeItem(i) {
    items.splice(i, 1);
    renderItems();
  }

  function updateSummary() {
    const sub    = items.reduce((s,it) => s + it.price, 0);
    const ongkir = Number(document.getElementById('f-ongkir').value) || 0;
    const diskon = Number(document.getElementById('f-diskon').value) || 0;
    const total  = sub + ongkir - diskon;
    document.getElementById('sum-sub').textContent    = rp(sub);
    document.getElementById('sum-ongkir').textContent = rp(ongkir);
    document.getElementById('sum-diskon').textContent = '- ' + rp(diskon);
    document.getElementById('sum-total').textContent  = rp(total);
  }

  // ── Generate ─────────────────────────────────────────
  function generateInvoice() {
    const buyer = document.getElementById('f-buyer').value.trim();
    if (!buyer) { showToast('Nama buyer wajib diisi'); return; }
    if (items.length === 0) { showToast('Tambah minimal 1 produk'); return; }

    const sub    = items.reduce((s,it) => s + it.price, 0);
    const ongkir = Number(document.getElementById('f-ongkir').value) || 0;
    const diskon = Number(document.getElementById('f-diskon').value) || 0;
    const total  = sub + ongkir - diskon;

    const inv = {
      id:     editingId || uid(),
      no:     editingId ? (invoices.find(i=>i.id===editingId)||{}).no || invNo() : invNo(),
      buyer,
      alamat: document.getElementById('f-alamat').value.trim(),
      items:  [...items],
      ongkir, diskon, sub, total,
      bayar:  document.getElementById('f-bayar').value,
      tgl:    document.getElementById('f-tgl').value,
      bank:   document.getElementById('f-bank').value.trim(),
      rek:    document.getElementById('f-rek').value.trim(),
      atas:   document.getElementById('f-atas').value.trim(),
      created: new Date().toISOString(),
    };

    if (editingId) {
      const idx = invoices.findIndex(i=>i.id===editingId);
      if (idx > -1) invoices[idx] = inv;
      editingId = null;
    } else {
      invoices.unshift(inv);
    }
    save();
    currentInvId = inv.id;
    renderPreview(inv);
    showView('preview');
  }

  // ── Preview ──────────────────────────────────────────
  function renderPreview(inv) {
    const badgeClass = inv.bayar === 'lunas' ? 'badge-lunas' : inv.bayar === 'dp' ? 'badge-dp' : 'badge-belum';
    const badgeText  = inv.bayar === 'lunas' ? '✓ Lunas' : inv.bayar === 'dp' ? '½ DP' : '⏳ Belum Bayar';

    const itemRows = inv.items.map(it => `
      <div class="inv-item-row">
        <div class="inv-item-name">${it.name}</div>
        <div class="inv-item-price">${rp(it.price)}</div>
      </div>
    `).join('');

    const paymentSection = (inv.bank || inv.rek) ? `
      <div class="inv-payment">
        <div class="inv-payment-label">💳 Info Pembayaran</div>
        ${inv.bank ? `<div class="inv-payment-row">Bank: <span>${inv.bank}</span></div>` : ''}
        ${inv.rek  ? `<div class="inv-payment-row">No. Rek: <span>${inv.rek}</span></div>` : ''}
        ${inv.atas ? `<div class="inv-payment-row">Atas Nama: <span>${inv.atas}</span></div>` : ''}
      </div>` : '';

    document.getElementById('invoice-preview').innerHTML = `
      <div class="inv-header">
        <div class="inv-brand">Root Studio</div>
        <div class="inv-tagline">Handcrafted Furniture</div>
        <div class="inv-no-row">
          <div class="inv-no">Invoice <span>${inv.no}</span></div>
          <div class="inv-date">Tanggal<span>${fmtDate(inv.tgl)}</span></div>
        </div>
      </div>
      <div class="inv-body">
        <div class="inv-to-label">Kepada Yth.</div>
        <div class="inv-to-name">${inv.buyer}</div>
        ${inv.alamat ? `<div class="inv-to-note">📍 ${inv.alamat}</div>` : ''}

        <div class="inv-divider"></div>

        <div class="inv-items-header">
          <span>Deskripsi</span><span>Harga</span>
        </div>
        ${itemRows}

        <div class="inv-total-box">
          <div class="inv-total-row"><span>Subtotal</span><span class="inv-total-val">${rp(inv.sub)}</span></div>
          ${inv.ongkir ? `<div class="inv-total-row"><span>Ongkir</span><span class="inv-total-val">${rp(inv.ongkir)}</span></div>` : ''}
          ${inv.diskon ? `<div class="inv-total-row"><span>Diskon</span><span class="inv-total-val">- ${rp(inv.diskon)}</span></div>` : ''}
          <div class="inv-total-row grand"><span>Total</span><span class="inv-total-val">${rp(inv.total)}</span></div>
        </div>

        ${paymentSection}

        <div class="inv-status-row">
          <span class="inv-status-badge ${badgeClass}">${badgeText}</span>
          <span class="inv-created">Dibuat ${fmtDate(inv.created?.split('T')[0])}</span>
        </div>
      </div>
      <div class="inv-footer">
        <div class="inv-footer-text">Terima kasih atas kepercayaan Anda 🌿</div>
        <div class="inv-footer-brand">Root Studio · Handcrafted Furniture</div>
      </div>
    `;
  }

  // ── Share & Copy ─────────────────────────────────────
  function shareInvoice() {
    const inv = invoices.find(i=>i.id===currentInvId);
    if (!inv) return;
    const text = buildTextInvoice(inv);
    if (navigator.share) {
      navigator.share({ title: 'Invoice ' + inv.no, text });
    } else {
      navigator.clipboard.writeText(text).then(() => showToast('Invoice disalin ke clipboard!'));
    }
  }

  function copyText() {
    const inv = invoices.find(i=>i.id===currentInvId);
    if (!inv) return;
    navigator.clipboard.writeText(buildTextInvoice(inv))
      .then(() => showToast('Teks invoice disalin!'));
  }

  function buildTextInvoice(inv) {
    const line = '─────────────────────';
    const items = inv.items.map(it => `  ${it.name.padEnd(20)} ${rp(it.price)}`).join('\n');
    return `
🌿 *ROOT STUDIO*
_Handcrafted Furniture_
${line}
*Invoice ${inv.no}*
Tanggal: ${fmtDate(inv.tgl)}
${line}
*Kepada:* ${inv.buyer}
${inv.alamat ? `Alamat: ${inv.alamat}` : ''}
${line}
*Detail Pesanan:*
${items}
${line}
Subtotal : ${rp(inv.sub)}
${inv.ongkir ? `Ongkir   : ${rp(inv.ongkir)}` : ''}
${inv.diskon ? `Diskon   : - ${rp(inv.diskon)}` : ''}
*TOTAL    : ${rp(inv.total)}*
${line}
${inv.bank || inv.rek ? `*Pembayaran:*
${inv.bank ? `Bank     : ${inv.bank}` : ''}
${inv.rek  ? `No. Rek  : ${inv.rek}` : ''}
${inv.atas ? `Atas Nama: ${inv.atas}` : ''}` : ''}
Status: ${inv.bayar === 'lunas' ? '✅ Lunas' : inv.bayar === 'dp' ? '⏳ DP' : '❌ Belum Bayar'}
${line}
_Terima kasih atas kepercayaan Anda 🌿_
    `.trim();
  }

  // ── Edit & Delete ─────────────────────────────────────
  function deleteInvoice() {
    if (!confirm('Hapus invoice ini?')) return;
    invoices = invoices.filter(i=>i.id!==currentInvId);
    save(); showView('history');
  }

  function loadForEdit(id) {
    const inv = invoices.find(i=>i.id===id);
    if (!inv) return;
    editingId = id;
    currentInvId = id;
    items = [...inv.items];
    document.getElementById('f-buyer').value  = inv.buyer;
    document.getElementById('f-alamat').value = inv.alamat || '';
    document.getElementById('f-ongkir').value = inv.ongkir || '';
    document.getElementById('f-diskon').value = inv.diskon || '';
    document.getElementById('f-bayar').value  = inv.bayar;
    document.getElementById('f-tgl').value    = inv.tgl || '';
    document.getElementById('f-bank').value   = inv.bank || '';
    document.getElementById('f-rek').value    = inv.rek  || '';
    document.getElementById('f-atas').value   = inv.atas || '';
    renderItems();
    showView('form');
  }

  // ── History ───────────────────────────────────────────
  function renderHistory() {
    const el = document.getElementById('history-list');
    if (invoices.length === 0) {
      el.innerHTML = `<div class="empty-hist">
        <div class="empty-hist-icon">🧾</div>
        <div>Belum ada invoice.<br>Tap <b>＋ Buat</b> untuk mulai.</div>
      </div>`; return;
    }
    el.innerHTML = invoices.map((inv, i) => {
      const badgeClass = inv.bayar === 'lunas' ? 'badge-lunas' : inv.bayar === 'dp' ? 'badge-dp' : 'badge-belum';
      const badgeText  = inv.bayar === 'lunas' ? '✓ Lunas' : inv.bayar === 'dp' ? 'DP' : 'Belum Bayar';
      return `
        <div class="hist-card" style="animation-delay:${i*0.04}s" onclick="openInvoice('${inv.id}')">
          <div class="hist-top">
            <div class="hist-buyer">${inv.buyer}</div>
            <span class="inv-status-badge ${badgeClass}" style="font-size:11px;padding:3px 10px">${badgeText}</span>
          </div>
          <div class="hist-meta">${inv.no} · ${fmtDate(inv.tgl)}</div>
          <div class="hist-total">${rp(inv.total)}</div>
        </div>
      `;
    }).join('');
  }

  function openInvoice(id) {
    const inv = invoices.find(i=>i.id===id);
    if (!inv) return;
    currentInvId = id;
    renderPreview(inv);
    showView('preview');
    // wire edit button
    document.querySelector('.btn-edit').onclick = () => loadForEdit(id);
  }

  function resetForm() {
    editingId = null;
    items = [];
    document.getElementById('f-buyer').value  = '';
    document.getElementById('f-alamat').value = '';
    document.getElementById('f-ongkir').value = '';
    document.getElementById('f-diskon').value = '';
    document.getElementById('f-bayar').value  = 'belum';
    document.getElementById('f-tgl').value    = new Date().toISOString().split('T')[0];
    document.getElementById('f-bank').value   = '';
    document.getElementById('f-rek').value    = '';
    document.getElementById('f-atas').value   = '';
    renderItems();
  }

  // init
  resetForm();
</script>
</body>
</html>
